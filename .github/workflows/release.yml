name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: jsscli

permissions:
  contents: write

jobs:
  build-release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y groff libdbus-1-dev pkg-config

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Run tests
        run: cargo test --release --locked

      - name: Build release binary
        run: cargo build --release --locked --verbose

      - name: Smoke test
        run: |
          ./target/release/$BINARY_NAME --version
          ./target/release/$BINARY_NAME --help

      - name: Generate SHA256 checksum
        run: |
          cd target/release
          sha256sum $BINARY_NAME > $BINARY_NAME.sha256
          cat $BINARY_NAME.sha256

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-linux-x86_64
          path: target/release/${{ env.BINARY_NAME }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/${{ env.BINARY_NAME }}
            target/release/${{ env.BINARY_NAME }}.sha256
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
