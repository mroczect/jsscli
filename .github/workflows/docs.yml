name: Deploy man page to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Convert man page to HTML
        run: |
          mkdir -p public
          # groff biasanya sudah terpasang di runner Ubuntu
          groff -mandoc -Thtml manual/jsscli.0.1.0.troff > public/index.html
          # Jika ingin styling, tambahkan CSS sederhana (opsional)
          echo '<style>body{font-family:monospace; max-width:80ch; margin:2em auto; padding:0 1em;}</style>' >> public/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./public"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
